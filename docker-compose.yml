```yaml
nano docker-compose.yml
```

```yaml
version: "3.8"
services:
  beszel:
    image: henrygd/beszel
    container_name: beszel
    restart: always
    ports:
      - "8090:8090"
    volumes:
      - ./data:/beszel_data
```

🚀 How to run it
Once saved:
```yaml
docker compose up -d
```
Check:
```yaml
docker ps
```

📌 What each part means
🧩 version
Defines Docker Compose format

🧩 services
Your application(s)

🧩 beszel
Your monitoring server container

🧩 image
Docker image used (Beszel)

🧩 ports

host:container
8090:8090

🧩 restart policy
always
keeps server running after reboot
